(defcfg
  macos-dev-names-include(
    "Apple Internal Keyboard / Trackpad"
    "ZEN 65 RGB-1"
   )
  process-unmapped-keys yes
  concurrent-tap-hold yes
)

(defsrc
    esc  f1   f2   f3   f4   f5   f6   f7   f8   f9   f10  f11  f12
    lsgt 1    2    3    4    5    6    7    8    9    0    -    =    bspc
    tab  q    w    e    r    t    y    u    i    o    p    [    ]
    caps a    s    d    f    g    h    j    k    l    ;    '    \    ret
    lsft grv  z    x    c    v    b    n    m    ,    .    /    rsft
    fn   lctl lalt lmet           spc            rmet ralt
)

(defchordsv2
  (w e) esc 30  first-release ()
  (j i) ret 30  first-release ()
  (i o) bspc 30  first-release ()
)

(defvar
  ;; Note: consider using different time values for your different fingers.
  ;; For example, your pinkies might be slower to release keys and index
  ;; fingers faster.
  tap-time 200
  hold-time 200
)


(defalias
  a (tap-hold $tap-time $hold-time a lmet)
  s (tap-hold $tap-time $hold-time s lalt)
  d (tap-hold $tap-time $hold-time d lctl)
  f (tap-hold $tap-time $hold-time f lsft)
  j (tap-hold $tap-time $hold-time j lsft)
  k (tap-hold $tap-time $hold-time k lctl)
  l (tap-hold $tap-time $hold-time l lalt)
  ; (tap-hold $tap-time $hold-time ; lmet)

  spc (tap-hold $tap-time $hold-time spc (layer-while-held nav))
  i (tap-hold $tap-time $hold-time i (layer-while-held num))
  e (tap-hold $tap-time $hold-time e (layer-while-held code))
)


(deflayer base
    ;; everything is exactly the same, only the f-row is changed.
    ;; you can of course change any of the other mappings.
    esc  🔅   🔆    ✗    ✗    f5    ✗    ◀◀   ▶⏸   ▶▶   🔇   🔉   🔊
    lsgt 1    2    3    4    5    6    7    8    9    0    -    =    bspc
    tab  q    w    @e   r    t    y    u    @i   o    p    [    ]
    caps @a   @s   @d   @f   g    h    @j   @k   @l   @;   '    \    ret
    lsft grv  z    x    c    v    b    n    m    ,    .    /    rsft
    fn   lctl lalt lmet           @spc            rmet ralt
)

(deflayer nav
    ;; everything is exactly the same, only the f-row is changed.
    ;; you can of course change any of the other mappings.
    esc  🔅   F2    ✗    ✗    f5    ✗    ◀◀   ▶⏸   ▶▶   🔇   🔉   🔊
    lsgt 1    2    3    4    5    6    7    8    9    0    -    =    bspc
    tab  q    w    e    r    t    y    u    i    o    p    [    ]
    caps @a   @s   @d   @f   g    ◀    ▼    ▲    ▶    ;   '    \    ret
    lsft grv  z    x    c    v    b    n    m    ,    .    /    rsft
    fn   lctl lalt lmet           spc            rmet ralt
)

(deflayer num
    ;; everything is exactly the same, only the f-row is changed.
    ;; you can of course change any of the other mappings.
    esc  🔅   F2    ✗    ✗    f5    ✗    ◀◀   ▶⏸   ▶▶   🔇   🔉   🔊
    lsgt 1    2    3    4    5    6    7    8    9    0    -    =    bspc
    tab  q    9    8    7    t    y    u    i    o    p    [    ]
    S-' '   6    5    4    g    ◀    ▼    ▲    ▶    ;   '    \    ret
    lsft grv  z    3    2    1    b    n    m    ,    .    /    rsft
    fn   lctl lalt lmet           0            rmet ralt
)

(deflayer code
    ;; everything is exactly the same, only the f-row is changed.
    ;; you can of course change any of the other mappings.
    esc  🔅   F2    ✗    ✗    f5    ✗    ◀◀   ▶⏸   ▶▶   🔇   🔉   🔊
    lsgt 1    2    3    4    5    6    7    8    9    0    -    =    bspc
    tab  q    9    8    7    t    y    S-9  S-0  S-[  S-]  [    ]
    caps @a   6    5    4    g    ◀    ▼    ▲    [    ]    S--  \    ret
    lsft grv  z    3    2    1    b    n    m    ,    .    /    rsft
    fn   lctl lalt lmet           0            rmet ralt
)


